name: radar-kleszczy

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?generated by infra/up.sh}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d radar"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [private]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD:?generated by infra/up.sh}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?generated by infra/up.sh}
    networks: [private]

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgres://radar:${POSTGRES_PASSWORD}@postgres:5432/radar
    depends_on:
      postgres:
        condition: service_healthy
    networks: [private]
    restart: "no"

  api:
    build:
      context: .
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgres://radar:${POSTGRES_PASSWORD}@postgres:5432/radar
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3001}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      EMAIL_PROVIDER: console
      EMAIL_FROM: Radar Kleszczy <noreply@localhost>
      TURNSTILE_SECRET_KEY: local-infrastructure-bypass
      TURNSTILE_BYPASS: "true"
      EMAIL_HMAC_SECRET: ${EMAIL_HMAC_SECRET}
      IP_HMAC_SECRET: ${IP_HMAC_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
      ADMIN_JWT_ISSUER: radar-kleszczy-admin
      MAGIC_LINK_TTL_MINUTES: 20
      SYMPTOM_LINK_TTL_DAYS: 45
      H3_RESOLUTION: 7
      PUBLIC_MIN_CELL_COUNT: 7
      SEASON_START_MONTH: 3
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health/ready"]
      interval: 10s
      timeout: 3s
      retries: 12
    networks: [private, public]

  retention:
    build:
      context: .
      target: migrate
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://radar:${POSTGRES_PASSWORD}@postgres:5432/radar
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:3001}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
      EMAIL_PROVIDER: console
      EMAIL_FROM: Radar Kleszczy <noreply@localhost>
      TURNSTILE_SECRET_KEY: local-infrastructure-bypass
      EMAIL_HMAC_SECRET: ${EMAIL_HMAC_SECRET}
      IP_HMAC_SECRET: ${IP_HMAC_SECRET}
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET}
    command: ["sh", "-c", "while true; do npm run db:cleanup; sleep 86400; done"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks: [private]

networks:
  public:
  private:
    internal: true

volumes:
  postgres_data:
  redis_data:
