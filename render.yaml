previews:
  generation: off

services:
  - type: web
    name: radar-kleszczy-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    preDeployCommand: npm run db:migrate
    startCommand: npm start
    healthCheckPath: /health/ready
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: radar-kleszczy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: radar-kleszczy-rate-limits
          property: connectionString
      - key: PUBLIC_APP_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: EMAIL_PROVIDER
        value: resend
      - key: EMAIL_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: TURNSTILE_BYPASS
        value: "false"
      - key: EMAIL_HMAC_SECRET
        generateValue: true
      - key: IP_HMAC_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: ADMIN_JWT_ISSUER
        value: radar-kleszczy-admin
      - key: MAGIC_LINK_TTL_MINUTES
        value: "20"
      - key: SYMPTOM_LINK_TTL_DAYS
        value: "45"
      - key: H3_RESOLUTION
        value: "7"
      - key: PUBLIC_MIN_CELL_COUNT
        value: "7"
      - key: SEASON_START_MONTH
        value: "3"

  - type: keyvalue
    name: radar-kleszczy-rate-limits
    region: frankfurt
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru
    persistenceMode: off

  - type: cron
    name: radar-kleszczy-retention
    runtime: node
    region: frankfurt
    plan: starter
    schedule: "17 2 * * *"
    buildCommand: npm ci --include=dev
    startCommand: npm run db:cleanup
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: radar-kleszczy-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: radar-kleszczy-rate-limits
          property: connectionString
      - key: PUBLIC_APP_URL
        value: https://unused.invalid
      - key: API_BASE_URL
        value: https://unused.invalid
      - key: EMAIL_PROVIDER
        value: console
      - key: EMAIL_FROM
        value: Radar Kleszczy <noreply@unused.invalid>
      - key: TURNSTILE_SECRET_KEY
        value: unused-by-retention-job
      - key: EMAIL_HMAC_SECRET
        generateValue: true
      - key: IP_HMAC_SECRET
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true

databases:
  - name: radar-kleszczy-db
    region: frankfurt
    plan: basic-256mb
    databaseName: radar_kleszczy
    user: radar_kleszczy
    ipAllowList: []
